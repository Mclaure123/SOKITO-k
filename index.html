<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sokoban Sovereign Player - Reference Edition</title>
    <style>
        :root {
            --bg-principal: #000000;
            --bg-tarjeta: #07070a;
            --texto-principal: #ffffff;
            --texto-secundario: #8f8f9d;
            --primario: #c5a3e8;
            --primario-hover: #b486e0;
            --exito: #50fa7b;
            --peligro: #ff6b8b;
            --borde: #1c1c28;
            --borde-focus: #c5a3e8;
            --cell-size: 42px; 
            --accent: #ffb86c;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body, input, button, select, textarea { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-principal); 
            color: var(--texto-principal); 
        }

        html, body { 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            padding: 0.5rem; 
        }

        *:focus-visible {
            outline: 2px solid var(--borde-focus);
            outline-offset: 1px;
        }

        /* --- ARQUITECTURA DE SUB-MATRICES Y TEXTURAS DE SKINS --- */
        
        /* MURO: Estilo base con divisiones horizontales dobles */
        .tile-g-wall {
            background: #171724;
            border: 2px solid #28283a;
            border-radius: 4px;
            position: relative;
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.5);
            width: 100%;
            height: 100%;
        }
        .tile-g-wall::before {
            content: "";
            position: absolute;
            top: 25%;
            left: 10%;
            width: 80%;
            height: 2px;
            background: #0d0d14;
            opacity: 0.8;
        }
        .tile-g-wall::after {
            content: "";
            position: absolute;
            bottom: 25%;
            left: 10%;
            width: 80%;
            height: 2px;
            background: #0d0d14;
            opacity: 0.8;
        }

        /* VARIACIONES DE MURO SEGÚN EL SKIN SELECCIONADO */
        .skin-cyber .tile-g-wall { background: #11111b; border: 2px solid #cba6f7; box-shadow: 0 0 8px #cba6f7; }
        .skin-industrial .tile-g-wall { background: #585b70; border: 3px solid #11111b; box-shadow: inset 2px 2px 0 #9399b2; }
        .skin-space .tile-g-wall { background: #1e1e2e; border: 2px solid #74c7ec; box-shadow: inset 0 0 8px rgba(116,199,236,0.3); }
        .skin-ruins .tile-g-wall { background: #f9e2af; border: 3px solid #dfb36c; box-shadow: inset 2px 2px 0 #fff; }
        .skin-arcade .tile-g-wall { background: #45475a; border: 3px double #11111b; }

        /* JUGADOR: Esfera 3D naranja por defecto */
        .tile-g-player {
            background: radial-gradient(circle at 35% 35%, #ffcc66 0%, #ff8800 70%, #993300 100%);
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5), inset -2px -2px 6px rgba(0,0,0,0.6);
            width: 80%;
            height: 80%;
        }

        /* JUGADOR SOBRE OBJETIVO: Superpone el círculo de destino abajo y el avatar arriba */
        .tile-g-playergoal {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tile-g-playergoal::before {
            content: "";
            position: absolute;
            border: 2px dashed #ff6b8b;
            border-radius: 50%;
            width: 50%;
            height: 50%;
            box-shadow: 0 0 6px rgba(255,107,139,0.3);
            z-index: 1;
        }
        .tile-g-playergoal::after {
            content: "";
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ff6b8b;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }
        .tile-g-playergoal-avatar {
            background: radial-gradient(circle at 35% 35%, #ffcc66 0%, #ff8800 70%, #993300 100%);
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5), inset -2px -2px 6px rgba(0,0,0,0.6);
            width: 80%;
            height: 80%;
            position: relative;
            z-index: 2;
        }

        /* CAJA: Renderizado vectorial de la caja de madera de referencia */
        .tile-g-box {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32' width='32' height='32'><rect width='32' height='32' fill='%238a5a36'/><rect x='3' y='3' width='26' height='26' fill='%23ab7a4e' stroke='%235c3b21' stroke-width='1'/><line x1='4' y1='4' x2='28' y2='28' stroke='%235c3b21' stroke-width='3'/><line x1='28' y1='4' x2='4' y2='28' stroke='%235c3b21' stroke-width='3'/><line x1='4' y1='4' x2='28' y2='28' stroke='%23cfa073' stroke-width='1'/><line x1='28' y1='4' x2='4' y2='28' stroke='%23cfa073' stroke-width='1'/><rect x='0' y='0' width='32' height='3' fill='%23cfa073'/><rect x='0' y='29' width='32' height='3' fill='%235c3b21'/><rect x='0' y='0' width='3' height='32' fill='%23cfa073'/><rect x='29' y='0' width='3' height='32' fill='%235c3b21'/><circle cx='1.5' cy='1.5' r='1' fill='%23fce2c4'/><circle cx='16' cy='1.5' r='1' fill='%23fce2c4'/><circle cx='30.5' cy='1.5' r='1' fill='%23fce2c4'/><circle cx='30.5' cy='16' r='1' fill='%23fce2c4'/><circle cx='30.5' cy='30.5' r='1' fill='%23fce2c4'/><circle cx='16' cy='30.5' r='1' fill='%23fce2c4'/><circle cx='1.5' cy='30.5' r='1' fill='%23fce2c4'/><circle cx='1.5' cy='16' r='1' fill='%23fce2c4'/></svg>");
            background-size: cover;
            border-radius: 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            width: 90%;
            height: 90%;
        }

        /* OBJETIVO VACÍO: Círculo punteado rojo con punto central */
        .tile-g-goal {
            border: 2px dashed #ff6b8b;
            border-radius: 50%;
            width: 50%;
            height: 50%;
            position: relative;
            box-shadow: 0 0 6px rgba(255,107,139,0.3);
        }
        .tile-g-goal::after {
            content: "";
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ff6b8b;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* CAJA EN OBJETIVO: Bloque verde plano con símbolo check */
        .tile-g-boxgoal {
            background-color: #a6e3a1; 
            border: 1px solid #50fa7b;
            box-shadow: 0 0 15px rgba(80,250,123,0.35);
            border-radius: 4px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 90%;
            height: 90%;
        }
        .tile-g-boxgoal::before {
            content: "✓";
            color: #11111b;
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* CELDA VACÍA DEL TABLERO */
        .grid-cell {
            width: var(--cell-size);
            height: var(--cell-size);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #0d0d12;
            background-color: #030305;
        }

        /* PLATAFORMAS / MENÚS */
        .pantalla {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-principal);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            z-index: 1000;
            padding: 1rem;
        }

        .pantalla--oculta {
            display: none !important;
        }

        .welcome-title {
            font-size: 2rem;
            color: var(--primario);
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(197, 163, 232, 0.3);
            text-align: center;
        }

        /* CUADRÍCULA DE SELECCIÓN DE NIVELES */
        .cards-grid {
            width: 100%;
            max-width: 800px;
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            grid-auto-rows: 60px;
            gap: 0.5rem;
            overflow-y: auto;
            padding: 0.5rem;
            border: 1px solid var(--borde);
            border-radius: 6px;
            background-color: #030305;
        }

        .level-card {
            background-color: var(--bg-tarjeta);
            border: 1px solid var(--borde);
            border-radius: 5px;
            padding: 0.5rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: border-color 0.15s, background-color 0.15s;
        }

        .level-card:hover {
            border-color: var(--primario);
            background-color: rgba(255,255,255,0.02);
        }

        /* WORKSPACE COHERENTE */
        header {
            height: 38px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--borde);
            margin-bottom: 0.4rem;
            padding: 0 0.5rem;
        }

        .header-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primario);
            letter-spacing: 0.5px;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            position: relative;
        }

        .header-btn-icon {
            background: transparent;
            border: none;
            font-size: 1.2rem;
            color: var(--primario);
            cursor: pointer;
            transition: transform 0.2s, color 0.15s;
            user-select: none;
        }

        .header-btn-icon:hover {
            color: var(--primario-hover);
            transform: scale(1.1);
        }

        /* MENÚ DESPLEGABLE CON ENGRANAJE DE SKINS */
        .skins-dropdown-menu {
            display: none;
            position: absolute;
            top: 32px;
            right: 140px;
            background-color: #07070a;
            border: 1px solid var(--borde);
            border-radius: 6px;
            width: 160px;
            z-index: 12000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.9);
            padding: 0.3rem;
        }

        .skins-dropdown-menu.active {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .skin-menu-opt {
            background: transparent;
            border: none;
            color: var(--texto-secundario);
            font-size: 0.78rem;
            padding: 0.35rem 0.5rem;
            text-align: left;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.12s, color 0.12s;
            width: 100%;
        }

        .skin-menu-opt:hover, .skin-menu-opt.selected {
            background-color: rgba(197, 163, 232, 0.08);
            color: var(--primario);
            font-weight: bold;
        }

        .workspace {
            display: flex;
            gap: 0.5rem;
            flex: 1;
            height: calc(100vh - 50px);
            align-items: stretch;
            overflow: hidden;
        }

        .panel-canvas-container {
            flex: 1;
            background-color: #000000;
            border: 1px solid var(--borde);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 0.5rem;
            position: relative;
        }

        .sokoban-grid {
            display: grid;
            gap: 1px;
            justify-content: center;
            align-content: center;
            outline: none;
        }

        /* PANEL CONTROL DE JUEGO */
        .panel-dashboard {
            width: 320px;
            flex-shrink: 0;
            background-color: var(--bg-tarjeta);
            border: 1px solid var(--borde);
            border-radius: 8px;
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            height: 100%;
            overflow-y: auto;
        }

        .dash-section {
            background-color: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--borde);
            border-radius: 6px;
            padding: 0.6rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .dash-title {
            font-size: 0.75rem;
            color: var(--texto-secundario);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--borde);
            padding-bottom: 0.25rem;
            margin-bottom: 0.2rem;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }

        .metric-label {
            color: var(--texto-secundario);
        }

        .metric-val {
            font-weight: 700;
            color: var(--texto-principal);
        }

        .metric-val--highlight {
            color: var(--primario);
        }

        .metric-val--success {
            color: var(--exito);
        }

        /* NAVEGACIÓN EN CUADRÍCULA DE NIVELES COMPACTADA (5 COLUMNAS - 30% MÁS PEQUEÑO) */
        .levels-nav-container {
            display: flex;
            gap: 0.4rem;
            align-items: stretch;
            flex: 1;
            min-height: 100px;
            max-height: 145px;
            overflow: hidden;
        }

        .dash-level-list {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.25rem;
            flex: 1;
            overflow-y: hidden; 
            scroll-behavior: smooth;
            padding: 0.1rem;
        }

        .dash-item-link {
            aspect-ratio: 1;
            border-radius: 4px;
            background-color: #0d0d12;
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--texto-principal);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--borde);
            transition: all 0.12s ease;
            user-select: none;
            position: relative;
        }

        .dash-item-link.active {
            border: 2px solid var(--primario);
            box-shadow: 0 0 8px rgba(197, 163, 232, 0.5);
            background-color: #12121c;
        }

        /* DISEÑO DE NIVEL COMPLETADO (TROFEO SOBRE NIVEL) */
        .dash-item-link.completed {
            border-color: var(--accent);
            color: var(--accent);
            background-color: rgba(255, 184, 108, 0.04);
        }

        .dash-item-link.completed::before {
            content: "🏆";
            position: absolute;
            top: -3px;
            right: -3px;
            font-size: 0.55rem;
        }

        .scroller-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            justify-content: space-between;
            width: 28px;
            flex-shrink: 0;
        }

        .btn-scroll {
            flex: 1;
            background-color: #0d0d12;
            border: 1px solid var(--borde);
            color: var(--primario);
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .btn-scroll:hover {
            background-color: var(--borde);
            color: var(--texto-principal);
        }

        /* BOTONES DE ACCIÓN */
        .action-button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.4rem;
        }

        .btn-action-undo {
            background-color: #000000;
            border: 1px solid var(--primario);
            color: var(--texto-principal);
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
            cursor: pointer;
            height: 34px;
            transition: background-color 0.12s;
        }

        .btn-action-undo:hover {
            background-color: #12121c;
        }

        .btn-action-restart {
            background-color: var(--primario);
            border: none;
            color: #000000;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
            cursor: pointer;
            height: 34px;
            transition: background-color 0.12s;
        }

        .btn-action-restart:hover {
            background-color: var(--primario-hover);
        }

        .btn {
            background-color: var(--primario);
            color: #000000;
            border: none;
            border-radius: 4px;
            padding: 0.5rem;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 32px;
            transition: background-color 0.12s;
        }

        .btn:hover {
            background-color: var(--primario-hover);
        }

        .btn--secondary {
            background-color: transparent;
            border: 1px solid var(--borde);
            color: var(--texto-principal);
        }

        .btn--secondary:hover {
            background-color: var(--borde);
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
            font-size: 100px;
        }

        /* TOAST SYSTEM */
        #toast-container {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            z-index: 11000;
            pointer-events: none;
        }

        .toast-message {
            background-color: #0d0d12;
            border: 1px solid var(--borde);
            color: var(--texto-principal);
            padding: 0.6rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            pointer-events: auto;
            animation: slideInToast 0.25s forwards;
        }

        @keyframes slideInToast {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* DIAGNÓSTICO */
        .diag-panel {
            font-family: monospace;
            font-size: 0.72rem;
            background-color: #030305;
            border: 1px solid var(--borde);
            border-radius: 6px;
            padding: 0.4rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .diag-row {
            display: flex;
            justify-content: space-between;
        }

        /* LOCKOUT FULLSCREEN */
        #fullscreen-lockout {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(5, 5, 8, 0.98);
            z-index: 10000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1rem;
        }
    </style>
</head>
<body class="skin-dungeon">

    <!-- PANTALLA BIENVENIDA -->
    <div id="welcome-screen" class="pantalla" role="dialog" aria-labelledby="welcome-title">
        <h1 id="welcome-title" class="welcome-title">SOKOBAN SOVEREIGN PLAYER</h1>
        
        <div style="display: flex; flex-direction: column; gap: 0.5rem; width: 260px;">
            <button type="button" class="btn" id="btn-play-default">Cargar Campaña Integrada</button>
            <div class="file-input-wrapper">
                <button type="button" class="btn btn--secondary" style="width: 100%;">Importar Fichero (.json)</button>
                <input type="file" id="file-import-campaign" accept=".json" aria-label="Importar archivo de niveles JSON">
            </div>
        </div>
    </div>

    <!-- SELECCIÓN DE NIVELES -->
    <div id="level-selection-screen" class="pantalla pantalla--oculta" role="dialog" aria-labelledby="menu-title">
        <h2 id="menu-title" class="welcome-title" style="font-size: 1.6rem;">Selección de Misión</h2>
        <div class="cards-grid" id="cards-container" role="listbox"></div>
        <button type="button" class="btn btn--secondary" id="btn-back-to-welcome" style="max-width: 200px;">Atrás</button>
    </div>

    <!-- RECOMENDACIÓN PANTALLA COMPLETA -->
    <div id="fullscreen-lockout" aria-live="polite">
        <h2 style="color:var(--primario)">MODO PANTALLA COMPLETA MANDATORIO</h2>
        <button type="button" class="btn" id="btn-restore-fullscreen" style="max-width: 240px;">Maximizar Pantalla</button>
        <button type="button" class="btn btn--secondary" id="btn-bypass-fullscreen" style="max-width: 240px; margin-top: 0.2rem;">Ignorar</button>
    </div>

    <!-- TOASTS -->
    <div id="toast-container" aria-live="assertive"></div>

    <!-- ENCABEZADO -->
    <header>
        <div class="header-title" id="txt-header-title">SOKOBAN SOVEREIGN PLAYER</div>
        
        <div class="header-controls">
            <!-- Botón de Silenciador de Sonido -->
            <button type="button" class="header-btn-icon" id="btn-toggle-sound" title="Mute/Unmute Sonido">🔊</button>
            
            <!-- Botón de Engranaje de Ajustes de Skins -->
            <button type="button" class="header-btn-icon" id="btn-skins-gear" title="Seleccionar Tematización">⚙️</button>
            
            <!-- Desplegable flotante de skins -->
            <div class="skins-dropdown-menu" id="skins-menu" role="menu">
                <button class="skin-menu-opt selected" data-skin="skin-dungeon" role="menuitem">🏰 Dungeon</button>
                <button class="skin-menu-opt" data-skin="skin-cyber" role="menuitem">🏭 Cyber</button>
                <button class="skin-menu-opt" data-skin="skin-industrial" role="menuitem">⚙️ Industrial</button>
                <button class="skin-menu-opt" data-skin="skin-space" role="menuitem">🚀 Space</button>
                <button class="skin-menu-opt" data-skin="skin-ruins" role="menuitem">🏛️ Ruins</button>
                <button class="skin-menu-opt" data-skin="skin-arcade" role="menuitem">🕹️ Arcade</button>
            </div>

            <button type="button" class="btn btn--secondary" id="btn-global-menu" style="width: 120px; height: 26px; font-size: 0.72rem;">Volver al Menú</button>
        </div>
    </header>

    <!-- ÁREA DE TRABAJO -->
    <main class="workspace">
        <section class="panel-canvas-container" id="canvas-viewport-box" aria-label="Visualizador del Juego">
            <div id="sokoban-canvas" class="sokoban-grid" tabindex="0" aria-label="Tablero Sokoban. Use flechas o WASD."></div>
        </section>

        <section class="panel-dashboard" aria-label="Dashboard Informativo">
            <!-- SECCIÓN METADATOS -->
            <div class="dash-section">
                <h2 class="dash-title" id="title-meta">Misión en Curso</h2>
                <div class="metric-row">
                    <span class="metric-label" id="lbl-mission-id">ID Nivel:</span>
                    <span id="dash-lbl-id" class="metric-val">-</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label" id="lbl-mission-name">Nombre:</span>
                    <span id="dash-lbl-name" class="metric-val" style="color: var(--primario);">-</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label" id="lbl-grid-size">Área Útil:</span>
                    <span id="dash-lbl-dim" class="metric-val">-</span>
                </div>
            </div>

            <!-- ESTADÍSTICAS -->
            <div class="dash-section">
                <h2 class="dash-title" id="title-audit">Estadísticas de Rango</h2>
                <div class="metric-row">
                    <span class="metric-label" id="lbl-moves">Movimientos:</span>
                    <span id="dash-lbl-moves" class="metric-val metric-val--highlight" style="font-size:1.1rem;">0</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label" id="lbl-goals">Objetivos OK:</span>
                    <span id="dash-lbl-goals" class="metric-val metric-val--success">0 / 0</span>
                </div>
            </div>

            <!-- BOTONES DE ACCIÓN PRINCIPAL -->
            <div class="action-button-grid">
                <button type="button" class="btn-action-undo" id="btn-dash-undo">Deshacer</button>
                <button type="button" class="btn-action-restart" id="btn-dash-restart">Reiniciar Intento</button>
            </div>

            <!-- SECCIÓN COLECCIÓN COMPACTA -->
            <div class="dash-section" style="display: flex; flex-direction: column;">
                <h2 class="dash-title" id="title-collection">Lista de Mapas del Pack</h2>
                
                <div class="levels-nav-container">
                    <div class="dash-level-list" id="dash-ui-level-list"></div>
                    
                    <div class="scroller-buttons">
                        <button type="button" class="btn-scroll" id="btn-scroll-up" title="Subir lista">▲</button>
                        <button type="button" class="btn-scroll" id="btn-scroll-down" title="Bajar lista">▼</button>
                    </div>
                </div>
            </div>

            <!-- TELEMETRÍA -->
            <div class="dash-section diag-panel">
                <div class="diag-row">
                    <span>Engine FSM:</span>
                    <span id="diag-fsm-state">BOOT</span>
                </div>
                <div class="diag-row">
                    <span>FPS:</span>
                    <span id="diag-fps">60</span>
                </div>
            </div>
        </section>
    </main>

    <!-- MOTOR INTERNO DE ARQUITECTURA SOKOBAN -->
    <script>
        const EducationalApp = (() => {

            const Config = {
                version: "3.0.0",
                storageKey: "SOKOBAN_SOVEREIGN_PLAYER_STATEDATA",
                adaptiveMinSize: 16,
                adaptiveMaxSize: 65,
                toastTimeout: 3000,
                defaultFileName: "sokoban_pack_collection.json"
            };

            const Constants = {
                MAP_TILES: [
                    { char: '#', class: 'tile-g-wall' },
                    { char: '@', class: 'tile-g-player' },
                    { char: '$', class: 'tile-g-box' },
                    { char: '.', class: 'tile-g-goal' },
                    { char: '*', class: 'tile-g-boxgoal' },
                    { char: '+', class: 'tile-g-playergoal' },
                    { char: ' ', class: 'tile-g-empty' }
                ],
                DEFAULT_CAMPAIGN: [
                    {
                        level: 1,
                        name: "level_1",
                        grid: [
                            "#####",
                            "#@$.#",
                            "#####"
                        ]
                    },
                    {
                        level: 2,
                        name: "Nivel 2",
                        grid: [
                            "######",
                            "#@  .#",
                            "# $  #",
                            "######"
                        ]
                    },
                    {
                        level: 3,
                        name: "Nivel 3",
                        grid: [
                            " #####     ",
                            " #@  #     ",
                            " #   #     ",
                            " #   ######",
                            " #  *#    #",
                            " #   #    #",
                            " # $.$ $.$#",
                            " ######### "
                        ]
                    }
                ]
            };

            const Events = {
                listeners: {},
                on(event, cb) {
                    if (!this.listeners[event]) this.listeners[event] = [];
                    this.listeners[event].push(cb);
                },
                emit(event, data) {
                    if (this.listeners[event]) {
                        this.listeners[event].forEach(cb => cb(data));
                    }
                }
            };

            // MOTOR DE AUDIO SINTETIZADO ADSR
            const AudioEngine = {
                ctx: null,
                enabled: true,

                init() {
                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    if (AudioContextClass) {
                        this.ctx = new AudioContextClass();
                    } else {
                        this.enabled = false;
                    }
                },

                playTone(freq, type, duration, volume, adsr = {}) {
                    if (!this.enabled || !this.ctx) return;
                    try {
                        if (this.ctx.state === 'suspended') {
                            this.ctx.resume();
                        }
                        const osc = this.ctx.createOscillator();
                        const gain = this.ctx.createGain();

                        osc.type = type || 'sine';
                        osc.frequency.value = freq;

                        const now = this.ctx.currentTime;
                        const attack = adsr.attack !== undefined ? adsr.attack : 0.02;
                        const decay = adsr.decay !== undefined ? adsr.decay : 0.05;
                        const sustain = adsr.sustain !== undefined ? adsr.sustain : 0.6;
                        const release = adsr.release !== undefined ? adsr.release : 0.1;

                        gain.gain.setValueAtTime(0, now);
                        gain.gain.linearRampToValueAtTime(volume || 0.1, now + attack);
                        gain.gain.exponentialRampToValueAtTime((volume || 0.1) * sustain, now + attack + decay);
                        gain.gain.setValueAtTime((volume || 0.1) * sustain, now + duration - release);
                        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

                        osc.connect(gain);
                        gain.connect(this.ctx.destination);

                        osc.start(now);
                        osc.stop(now + duration);
                    } catch (e) {
                        console.error("Audio synth error", e);
                    }
                },

                playStep() {
                    this.playTone(150, 'triangle', 0.07, 0.1, { attack: 0.01, decay: 0.02, sustain: 0.4, release: 0.03 });
                },

                playPush() {
                    this.playTone(100, 'sawtooth', 0.12, 0.15, { attack: 0.02, decay: 0.04, sustain: 0.5, release: 0.05 });
                },

                playGoalOk() {
                    this.playTone(392, 'sine', 0.15, 0.15, { attack: 0.02, decay: 0.03, sustain: 0.7, release: 0.05 });
                    setTimeout(() => {
                        this.playTone(523.25, 'sine', 0.2, 0.15, { attack: 0.02, decay: 0.03, sustain: 0.7, release: 0.05 });
                    }, 80);
                },

                playVictory() {
                    const notes = [261.63, 329.63, 392.00, 523.25];
                    notes.forEach((freq, idx) => {
                        setTimeout(() => {
                            this.playTone(freq, 'sine', 0.25, 0.15, { attack: 0.04, decay: 0.08, sustain: 0.7, release: 0.1 });
                        }, idx * 100);
                    });
                }
            };

            const Storage = {
                save(data) {
                    try {
                        localStorage.setItem(Config.storageKey, JSON.stringify(data));
                    } catch (e) {
                        console.error("Storage save failed", e);
                    }
                },
                load() {
                    try {
                        const raw = localStorage.getItem(Config.storageKey);
                        if (!raw) return { completedLevels: [], currentSkin: "skin-dungeon" };
                        const parsed = JSON.parse(raw);
                        if (!parsed.currentSkin) parsed.currentSkin = "skin-dungeon";
                        return parsed;
                    } catch {
                        return { completedLevels: [], currentSkin: "skin-dungeon" };
                    }
                }
            };

            const FSM = {
                currentState: null,
                states: {
                    BOOT: {
                        enter() { 
                            Events.emit('FSM_TRANSITION', 'BOOT'); 
                            fetch(Config.defaultFileName)
                                .then(res => {
                                    if (!res.ok) throw new Error("No se pudo leer el archivo local");
                                    return res.json();
                                })
                                .then(data => {
                                    const imported = Array.isArray(data) ? data : (data.levels && Array.isArray(data.levels) ? data.levels : [data]);
                                    GameEngine.setCampaign(imported);
                                    UI.triggerToast("Colección cargada por defecto.", "success");
                                })
                                .catch(err => {
                                    console.warn("Fichero por defecto ausente o inaccesible. Cargando respaldo integrado.", err);
                                    GameEngine.setCampaign(Constants.DEFAULT_CAMPAIGN);
                                });
                        },
                        exit() {}
                    },
                    MENU: {
                        enter() {
                            document.getElementById('level-selection-screen').classList.remove('pantalla--oculta');
                            Events.emit('FSM_TRANSITION', 'MENU');
                        },
                        exit() {
                            document.getElementById('level-selection-screen').classList.add('pantalla--oculta');
                        }
                    },
                    PLAYING: {
                        enter() {
                            document.getElementById('welcome-screen').classList.add('pantalla--oculta');
                            document.getElementById('level-selection-screen').classList.add('pantalla--oculta');
                            Events.emit('FSM_TRANSITION', 'PLAYING');
                        },
                        exit() {}
                    }
                },
                transitionTo(stateName) {
                    if (this.states[stateName]) {
                        if (this.currentState) this.states[this.currentState].exit();
                        this.currentState = stateName;
                        this.states[this.currentState].enter();
                    }
                }
            };

            const GameEngine = {
                campaignPack: [],
                currentLevelIndex: 0,
                liveGridMatrix: [],
                playerPos: { r: 0, c: 0 },
                movesCount: 0,
                historyBuffer: [],
                isWorkspaceActive: false,

                init() {
                    this.campaignPack = Constants.DEFAULT_CAMPAIGN;
                },

                setCampaign(levels) {
                    this.campaignPack = levels;
                    this.currentLevelIndex = 0;
                },

                launchLevel(index) {
                    if (index < 0 || index >= this.campaignPack.length) return;
                    this.currentLevelIndex = index;
                    const levelData = this.campaignPack[index];
                    this.movesCount = 0;
                    this.historyBuffer = [];

                    this.liveGridMatrix = [];
                    const rows = levelData.grid.length;
                    const cols = levelData.grid[0].length;

                    for (let r = 0; r < rows; r++) {
                        const line = levelData.grid[r];
                        const rowArr = [];
                        for (let c = 0; c < cols; c++) {
                            const char = line[c] || ' ';
                            rowArr.push(char);
                            if (char === '@' || char === '+') {
                                this.playerPos = { r, c };
                            }
                        }
                        this.liveGridMatrix.push(rowArr);
                    }

                    this.isWorkspaceActive = true;
                    FSM.transitionTo('PLAYING');
                    
                    Events.emit('LEVEL_LOADED', {
                        index,
                        levelData,
                        cols,
                        rows
                    });
                },

                restartLevel() {
                    this.launchLevel(this.currentLevelIndex);
                },

                saveHistoryState() {
                    this.historyBuffer.push({
                        grid: this.liveGridMatrix.map(row => [...row]),
                        playerPos: { ...this.playerPos },
                        movesCount: this.movesCount
                    });
                },

                undoMove() {
                    if (this.historyBuffer.length === 0) return;
                    const lastSnap = this.historyBuffer.pop();
                    this.liveGridMatrix = lastSnap.grid;
                    this.playerPos = lastSnap.playerPos;
                    this.movesCount = lastSnap.movesCount;
                    
                    AudioEngine.playStep();
                    Events.emit('GRID_UPDATE', { isUndo: true });
                },

                tryMove(dRow, dCol) {
                    if (!this.isWorkspaceActive) return;
                    
                    const targetR = this.playerPos.r + dRow;
                    const targetC = this.playerPos.c + dCol;

                    if (targetR < 0 || targetR >= this.liveGridMatrix.length || 
                        targetC < 0 || targetC >= this.liveGridMatrix[0].length) return;

                    const targetChar = this.liveGridMatrix[targetR][targetC];

                    if (targetChar === ' ' || targetChar === '.') {
                        this.saveHistoryState();
                        this.movePlayer(targetR, targetC);
                        this.movesCount++;
                        AudioEngine.playStep();
                        Events.emit('GRID_UPDATE', { isUndo: false });
                    }
                    else if (targetChar === '$' || targetChar === '*') {
                        const nextBoxR = targetR + dRow;
                        const nextBoxC = targetC + dCol;

                        if (nextBoxR >= 0 && nextBoxR < this.liveGridMatrix.length && 
                            nextBoxC >= 0 && nextBoxC < this.liveGridMatrix[0].length) {
                            
                            const boxLandingChar = this.liveGridMatrix[nextBoxR][nextBoxC];
                            if (boxLandingChar === ' ' || boxLandingChar === '.') {
                                this.saveHistoryState();
                                
                                this.liveGridMatrix[nextBoxR][nextBoxC] = (boxLandingChar === '.') ? '*' : '$';
                                this.liveGridMatrix[targetR][targetC] = (targetChar === '*') ? '.' : ' ';
                                
                                this.movePlayer(targetR, targetC);
                                this.movesCount++;

                                if (boxLandingChar === '.') {
                                    AudioEngine.playGoalOk();
                                } else {
                                    AudioEngine.playPush();
                                }

                                Events.emit('GRID_UPDATE', { isUndo: false });
                                this.checkVictory();
                            }
                        }
                    }
                },

                movePlayer(r, c) {
                    const curChar = this.liveGridMatrix[this.playerPos.r][this.playerPos.c];
                    this.liveGridMatrix[this.playerPos.r][this.playerPos.c] = (curChar === '+') ? '.' : ' ';
                    
                    const tarChar = this.liveGridMatrix[r][c];
                    this.liveGridMatrix[r][c] = (tarChar === '.') ? '+' : '@';
                    
                    this.playerPos = { r, c };
                },

                checkVictory() {
                    let boxesRemaining = 0;
                    this.liveGridMatrix.forEach(row => {
                        row.forEach(char => {
                            if (char === '$') boxesRemaining++;
                        });
                    });

                    if (boxesRemaining === 0) {
                        this.isWorkspaceActive = false;
                        AudioEngine.playVictory();
                        
                        const saved = Storage.load();
                        if (!saved.completedLevels.includes(this.currentLevelIndex)) {
                            saved.completedLevels.push(this.currentLevelIndex);
                            Storage.save(saved);
                        }

                        Events.emit('VICTORY', {
                            levelNo: this.campaignPack[this.currentLevelIndex].level,
                            moves: this.movesCount
                        });

                        setTimeout(() => {
                            if (this.currentLevelIndex + 1 < this.campaignPack.length) {
                                this.launchLevel(this.currentLevelIndex + 1);
                            } else {
                                Events.emit('CAMPAIGN_COMPLETE', {});
                                FSM.transitionTo('MENU');
                            }
                        }, 2200);
                    }
                }
            };

            const UI = {
                fps: 0,
                lastFpsUpdate: 0,
                frameCount: 0,

                init() {
                    this.loadSavedThemeState();
                    this.registerDomListeners();
                    this.startFpsCounter();
                },

                loadSavedThemeState() {
                    const saved = Storage.load();
                    document.body.className = saved.currentSkin;
                    
                    // Sincroniza indicador activo en menú desplegable
                    document.querySelectorAll('.skin-menu-opt').forEach(opt => {
                        if (opt.dataset.skin === saved.currentSkin) {
                            opt.classList.add('selected');
                        } else {
                            opt.classList.remove('selected');
                        }
                    });
                },

                attemptFullscreen() {
                    const docEl = document.documentElement;
                    const request = docEl.requestFullscreen || docEl.webkitRequestFullscreen || docEl.mozRequestFullScreen || docEl.msRequestFullscreen;
                    if (request) {
                        request.call(docEl).catch(err => {
                            console.warn("Fullscreen request rejected", err);
                        });
                    }
                },

                registerDomListeners() {
                    const welcome = document.getElementById('welcome-screen');
                    const fileImport = document.getElementById('file-import-campaign');
                    const btnPlayDefault = document.getElementById('btn-play-default');
                    const btnBackWelcome = document.getElementById('btn-back-to-welcome');
                    const btnRestoreFull = document.getElementById('btn-restore-fullscreen');
                    const btnBypassFull = document.getElementById('btn-bypass-fullscreen');
                    const btnGlobalMenu = document.getElementById('btn-global-menu');
                    const btnDashRestart = document.getElementById('btn-dash-restart');
                    const btnDashUndo = document.getElementById('btn-dash-undo');
                    
                    const btnScrollUp = document.getElementById('btn-scroll-up');
                    const btnScrollDown = document.getElementById('btn-scroll-down');
                    const levelContainer = document.getElementById('dash-ui-level-list');

                    // Controles de cabecera
                    const btnToggleSound = document.getElementById('btn-toggle-sound');
                    const btnSkinsGear = document.getElementById('btn-skins-gear');
                    const skinsMenu = document.getElementById('skins-menu');

                    btnPlayDefault.addEventListener('click', () => {
                        this.attemptFullscreen();
                        welcome.classList.add('pantalla--oculta');
                        this.showLevelMenu();
                    });

                    btnBackWelcome.addEventListener('click', () => {
                        FSM.transitionTo('BOOT');
                        welcome.classList.remove('pantalla--oculta');
                        document.getElementById('level-selection-screen').classList.add('pantalla--oculta');
                    });

                    fileImport.addEventListener('change', (e) => {
                        const file = e.target.files[0];
                        if (!file) return;
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            try {
                                const parsed = JSON.parse(event.target.result);
                                const imported = Array.isArray(parsed) ? parsed : (parsed.levels && Array.isArray(parsed.levels) ? parsed.levels : [parsed]);
                                if (imported.length === 0 || !imported[0].grid) throw new Error("Invalido");
                                
                                this.attemptFullscreen();
                                GameEngine.setCampaign(imported);
                                this.triggerToast("Colección de niveles cargada con éxito.", "success");
                                welcome.classList.add('pantalla--oculta');
                                this.showLevelMenu();
                            } catch {
                                this.triggerToast("Fichero no compatible.", "error");
                            }
                        };
                        reader.readAsText(file);
                    });

                    btnRestoreFull.addEventListener('click', () => {
                        this.attemptFullscreen();
                    });

                    btnBypassFull.addEventListener('click', () => {
                        document.getElementById('fullscreen-lockout').style.display = 'none';
                    });

                    btnGlobalMenu.addEventListener('click', () => {
                        GameEngine.isWorkspaceActive = false;
                        FSM.transitionTo('MENU');
                    });

                    btnDashRestart.addEventListener('click', () => {
                        GameEngine.restartLevel();
                    });

                    btnDashUndo.addEventListener('click', () => {
                        GameEngine.undoMove();
                    });

                    btnScrollUp.addEventListener('click', () => {
                        levelContainer.scrollBy({ top: -38, behavior: 'smooth' });
                    });

                    btnScrollDown.addEventListener('click', () => {
                        levelContainer.scrollBy({ top: 38, behavior: 'smooth' });
                    });

                    // Manejo del silenciamiento de audio en cabecera
                    btnToggleSound.addEventListener('click', () => {
                        AudioEngine.enabled = !AudioEngine.enabled;
                        if (AudioEngine.enabled) {
                            btnToggleSound.textContent = "🔊";
                            this.triggerToast("Sonido activado.", "success");
                            AudioEngine.playStep();
                        } else {
                            btnToggleSound.textContent = "🔇";
                            this.triggerToast("Sonido silenciado.", "info");
                        }
                    });

                    // Desplegar menú de skins con engranaje
                    btnSkinsGear.addEventListener('click', (e) => {
                        e.stopPropagation();
                        skinsMenu.classList.toggle('active');
                    });

                    // Ocultar desplegable al hacer clic fuera del componente
                    document.addEventListener('click', () => {
                        skinsMenu.classList.remove('active');
                    });

                    // Gestión de alternancia de skins
                    document.querySelectorAll('.skin-menu-opt').forEach(opt => {
                        opt.addEventListener('click', () => {
                            const selectedSkin = opt.dataset.skin;
                            document.body.className = selectedSkin;
                            
                            document.querySelectorAll('.skin-menu-opt').forEach(o => o.classList.remove('selected'));
                            opt.classList.add('selected');

                            // Guardar selección del tema en el perfil de almacenamiento local
                            const saved = Storage.load();
                            saved.currentSkin = selectedSkin;
                            Storage.save(saved);

                            this.triggerToast("Apariencia visual modificada.", "success");
                        });
                    });

                    window.addEventListener('keydown', (e) => this.handleKeyboardInput(e));
                    
                    window.addEventListener('resize', () => {
                        if (GameEngine.isWorkspaceActive && GameEngine.liveGridMatrix.length > 0) {
                            this.recalculateAdaptiveTileSize(GameEngine.liveGridMatrix[0].length, GameEngine.liveGridMatrix.length);
                        }
                    });

                    document.addEventListener('fullscreenchange', () => this.auditFullscreenState());
                    document.addEventListener('webkitfullscreenchange', () => this.auditFullscreenState());
                },

                triggerToast(message, type = 'info') {
                    const container = document.getElementById('toast-container');
                    const toast = document.createElement('div');
                    toast.className = `toast-message ${type}`;
                    toast.textContent = message;
                    container.appendChild(toast);
                    setTimeout(() => { toast.remove(); }, Config.toastTimeout);
                },

                auditFullscreenState() {
                    const isFull = !!(document.fullscreenElement || document.webkitFullscreenElement);
                    const lockout = document.getElementById('fullscreen-lockout');
                    if (GameEngine.isWorkspaceActive && !isFull) {
                        lockout.style.display = 'flex';
                    } else {
                        lockout.style.display = 'none';
                    }
                },

                showLevelMenu() {
                    FSM.transitionTo('MENU');
                    const container = document.getElementById('cards-container');
                    container.innerHTML = '';

                    const saved = Storage.load();
                    const completedSet = new Set(saved.completedLevels || []);

                    GameEngine.campaignPack.forEach((lvl, index) => {
                        const card = document.createElement('div');
                        card.className = 'level-card';
                        card.setAttribute('role', 'option');
                        card.setAttribute('tabindex', '0');

                        const checkmark = completedSet.has(index) ? " ✓" : "";

                        card.innerHTML = `
                            <div style="font-size: 0.65rem; color: var(--primario); font-weight: 700;">Lvl ${lvl.level}</div>
                            <div style="font-size: 0.85rem; font-weight: 700;">${lvl.name}${checkmark}</div>
                        `;

                        card.addEventListener('click', () => {
                            this.attemptFullscreen();
                            GameEngine.launchLevel(index);
                        });

                        container.appendChild(card);
                    });

                    this.syncDashboardLevelSidebar();
                },

                syncDashboardLevelSidebar() {
                    const list = document.getElementById('dash-ui-level-list');
                    list.innerHTML = '';
                    
                    const saved = Storage.load();
                    const completedSet = new Set(saved.completedLevels || []);

                    GameEngine.campaignPack.forEach((lvl, index) => {
                        const lnk = document.createElement('div');
                        
                        const isCompleted = completedSet.has(index);
                        const isCompletedClass = isCompleted ? 'completed' : '';
                        const isActiveClass = index === GameEngine.currentLevelIndex ? 'active' : '';
                        
                        lnk.className = `dash-item-link ${isActiveClass} ${isCompletedClass}`;
                        lnk.textContent = lvl.level;
                        lnk.title = lvl.name;
                        
                        lnk.addEventListener('click', () => {
                            if (index !== GameEngine.currentLevelIndex) {
                                this.attemptFullscreen();
                                GameEngine.launchLevel(index);
                            }
                        });
                        list.appendChild(lnk);
                    });
                },

                recalculateAdaptiveTileSize(cols, rows) {
                    const viewport = document.getElementById('canvas-viewport-box');
                    const maxWidth = viewport.clientWidth - 20;
                    const maxHeight = viewport.clientHeight - 20;
                    const idealWidth = maxWidth / cols;
                    const idealHeight = maxHeight / rows;
                    let calculatedSize = Math.min(idealWidth, idealHeight);

                    if (calculatedSize > Config.adaptiveMaxSize) calculatedSize = Config.adaptiveMaxSize;
                    if (calculatedSize < Config.adaptiveMinSize) calculatedSize = Config.adaptiveMinSize;
                    
                    document.documentElement.style.setProperty('--cell-size', `${calculatedSize}px`);
                },

                renderGrid() {
                    const canvas = document.getElementById('sokoban-canvas');
                    const width = GameEngine.liveGridMatrix[0].length;
                    const height = GameEngine.liveGridMatrix.length;

                    this.recalculateAdaptiveTileSize(width, height);
                    canvas.innerHTML = '';
                    canvas.style.gridTemplateColumns = `repeat(${width}, var(--cell-size))`;

                    for (let r = 0; r < height; r++) {
                        for (let c = 0; c < width; c++) {
                            const cell = document.createElement('div');
                            cell.className = 'grid-cell';
                            cell.id = `g-cell-${r}-${c}`;

                            const char = GameEngine.liveGridMatrix[r][c];
                            const tileConfig = Constants.MAP_TILES.find(t => t.char === char) || Constants.MAP_TILES[6];

                            const graphicNode = document.createElement('div');
                            graphicNode.className = `tile-graphic ${tileConfig.class}`;
                            
                            if (char === '+') {
                                const avatar = document.createElement('div');
                                avatar.className = 'tile-g-playergoal-avatar';
                                graphicNode.appendChild(avatar);
                            }

                            cell.appendChild(graphicNode);
                            canvas.appendChild(cell);
                        }
                    }

                    this.updateGoalsCountMetric();
                },

                updateCellGraphic(r, c) {
                    const cellElement = document.getElementById(`g-cell-${r}-${c}`);
                    if (!cellElement) return;
                    const char = GameEngine.liveGridMatrix[r][c];
                    const tileConfig = Constants.MAP_TILES.find(t => t.char === char) || Constants.MAP_TILES[6];
                    const graphicNode = cellElement.querySelector('.tile-graphic');
                    if (graphicNode) {
                        graphicNode.className = `tile-graphic ${tileConfig.class}`;
                        graphicNode.innerHTML = ''; 
                        if (char === '+') {
                            const avatar = document.createElement('div');
                            avatar.className = 'tile-g-playergoal-avatar';
                            graphicNode.appendChild(avatar);
                        }
                    }
                },

                updateGoalsCountMetric() {
                    let totalGoals = 0;
                    let accomplished = 0;

                    GameEngine.liveGridMatrix.forEach(row => {
                        row.forEach(char => {
                            if (char === '.') totalGoals++;
                            if (char === '*') {
                                totalGoals++;
                                accomplished++;
                            }
                            if (char === '+') totalGoals++;
                        });
                    });

                    document.getElementById('dash-lbl-goals').textContent = `${accomplished} / ${totalGoals}`;
                },

                handleKeyboardInput(event) {
                    if (event.ctrlKey && event.altKey && (event.key === 'l' || event.key === 'L')) {
                        event.preventDefault();
                        document.getElementById('file-import-campaign').click();
                        return;
                    }

                    if (!GameEngine.isWorkspaceActive) return;
                    let dRow = 0;
                    let dCol = 0;

                    switch (event.key) {
                        case 'ArrowUp':
                        case 'w':
                        case 'W':
                            dRow = -1;
                            break;
                        case 'ArrowDown':
                        case 's':
                        case 'S':
                            dRow = 1;
                            break;
                        case 'ArrowLeft':
                        case 'a':
                        case 'A':
                            dCol = -1;
                            break;
                        case 'ArrowRight':
                        case 'd':
                        case 'D':
                            dCol = 1;
                            break;
                        default:
                            return;
                    }
                    event.preventDefault();
                    GameEngine.tryMove(dRow, dCol);
                },

                startFpsCounter() {
                    const loop = (timestamp) => {
                        if (!this.lastFpsUpdate) this.lastFpsUpdate = timestamp;
                        this.frameCount++;

                        if (timestamp - this.lastFpsUpdate >= 1000) {
                            this.fps = this.frameCount;
                            this.frameCount = 0;
                            this.lastFpsUpdate = timestamp;
                            document.getElementById('diag-fps').textContent = this.fps;
                        }
                        requestAnimationFrame(loop);
                    };
                    requestAnimationFrame(loop);
                }
            };

            const setupEventInteractions = () => {
                Events.on('FSM_TRANSITION', (state) => {
                    document.getElementById('diag-fsm-state').textContent = state;
                });

                Events.on('LEVEL_LOADED', (data) => {
                    document.getElementById('dash-lbl-id').textContent = data.levelData.level;
                    document.getElementById('dash-lbl-name').textContent = data.levelData.name;
                    document.getElementById('dash-lbl-dim').textContent = `${data.cols} x ${data.rows}`;
                    document.getElementById('dash-lbl-moves').textContent = GameEngine.movesCount;
                    
                    UI.syncDashboardLevelSidebar();
                    UI.renderGrid();
                    UI.auditFullscreenState();
                });

                Events.on('GRID_UPDATE', () => {
                    document.getElementById('dash-lbl-moves').textContent = GameEngine.movesCount;
                    GameEngine.liveGridMatrix.forEach((row, r) => {
                        row.forEach((_, c) => {
                            UI.updateCellGraphic(r, c);
                        });
                    });
                    UI.updateGoalsCountMetric();
                });

                Events.on('VICTORY', (data) => {
                    UI.triggerToast(`Misión ${data.levelNo} completada en ${data.moves} movimientos.`, "success");
                    UI.syncDashboardLevelSidebar();
                });

                Events.on('CAMPAIGN_COMPLETE', () => {
                    UI.triggerToast("¡Enhorabuena! Ha completado la campaña.", "success");
                });
            };

            const init = () => {
                AudioEngine.init();
                GameEngine.init();
                UI.init();
                setupEventInteractions();
                FSM.transitionTo('BOOT');
            };

            return { init };
        })();

        document.addEventListener('DOMContentLoaded', () => {
            EducationalApp.init();
        });
    </script>
</body>
</html>
